
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>員工薪資查詢</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
    font-family:"微軟正黑體";
    background:#f4f6f9;
    margin:0;
}

/* loading */
.loading{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.9);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.spinner{
    width:60px;
    height:60px;
    border:6px solid #eee;
    border-top:6px solid #2ecc71;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

.loading-text{
    margin-top:15px;
    font-size:20px;
}

/* container */
.container{
    width:100%;
    max-width:560px;
    margin:auto;
    padding:20px;
    box-sizing:border-box;
}

.title{
    text-align:center;
    font-size:42px;
    font-weight:bold;
    margin-bottom:10px;
}

.greeting{
    text-align:center;
    font-size:24px;
    margin-bottom:10px;
}

.date-display{
    text-align:center;
    font-size:20px;
    margin-bottom:15px;
    color:#555;
}

/* login */
.search-box{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:15px;
    margin:30px 0;
}

input[type="password"]{
    width:100%;
    max-width:460px;
    height:65px;
    font-size:24px;
    padding:15px;
    border:2px solid #ccc;
    border-radius:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    max-width:460px;
    height:65px;
    font-size:24px;
    font-weight:bold;
    background:#2ecc71;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

button:disabled{
    background:#95a5a6;
}

/* 薪資卡片 */
.salary-card{
    background:white;
    border-radius:18px;
    padding:28px;
    margin:20px auto;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    border:1px solid #eee;
}

.salary-title{
    font-size:34px;
    font-weight:bold;
    text-align:center;
    margin-bottom:15px;
    color:#2c3e50;
}

.info{
    font-size:22px;
    line-height:1.8;
    margin-bottom:15px;
}

.salary-table{
    width:100%;
    border-collapse:collapse;
    font-size:24px;
}

.salary-table td{
    border:1px solid #eee;
    padding:12px;
}

.table-head{
    background:#f2f2f2;
    font-weight:bold;
    text-align:center;
}

.subtotal{
    font-weight:bold;
    background:#fafafa;
}

.final-total{
    margin-top:20px;
    font-size:34px;
    font-weight:bold;
    text-align:right;
    color:#1e8449;
}

.note{
    margin-top:20px;
    font-size:18px;
    color:#555;
}
</style>
</head>

<body>

<!-- loading -->
<div id="loading" class="loading" style="display:none;">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">載入中...</div>
</div>

<div class="container">

    <div class="title">員工薪資查詢</div>
    <div id="greeting" class="greeting"></div>
    <div id="date-display" class="date-display"></div>

    <div class="search-box" id="code-box" style="display:none;">
        <input type="password" id="uid" placeholder="請輸入代碼">
        <button id="queryBtn" onclick="querySalary()">查詢薪資</button>
    </div>

    <div id="result"></div>

</div>

<script>

var url="https://script.google.com/macros/s/AKfycbzCGnlurATtmipIZBZepRwWzQeRTKOV5DqEdA4IjWHHGY-MT4fuQAZqUC729tLsYVD5/exec"; 
var lineId="";
var lineName="";

function formatDate(d){
    return d.getFullYear()+"-"+(d.getMonth()+1).toString().padStart(2,'0')+"-"+d.getDate().toString().padStart(2,'0');
}

/* LIFF */
liff.init({liffId: "2009495087-qHY8LDuV"})
.then(()=>{

    if(!liff.isLoggedIn()){
        lineId="test";
        lineName="測試使用者";

        document.getElementById("greeting").innerText=lineName+" 您好:";
        document.getElementById("date-display").innerText="查詢日期: "+formatDate(new Date());

        document.getElementById("code-box").style.display="flex";
        return;
    }

    return liff.getProfile();
})
.then(profile=>{

    if(profile){
        lineId=profile.userId;
        lineName=profile.displayName;

        document.getElementById("greeting").innerText=lineName+" 您好:";
        document.getElementById("date-display").innerText="查詢日期: "+formatDate(new Date());
    }

    fetch(url+"?uid=&lineid="+encodeURIComponent(lineId))
    .then(res=>res.json())
    .then(data=>{
        if(data.length>1){
            document.getElementById("code-box").style.display="flex";
        }else{
            document.getElementById("result").innerHTML="<h3 style='color:red;text-align:center'>尚未建立資料</h3>";
        }
    });

})
.catch(err=>console.error(err));

/* 查詢 */
function querySalary(){

    let uid=document.getElementById("uid").value.trim();
    if(!uid){
        alert("請輸入代碼");
        return;
    }

    let btn=document.getElementById("queryBtn");
    let loading=document.getElementById("loading");

    btn.disabled=true;
    loading.style.display="flex";
    document.getElementById("loadingText").innerText="登入中...";

    fetch(url+"?uid="+encodeURIComponent(uid)+"&lineid="+encodeURIComponent(lineId))
    .then(res=>res.json())
    .then(data=>{

        btn.disabled=false;
        loading.style.display="none";

        if(data.length<=1){
            document.getElementById("result").innerHTML="<h3 style='color:red;text-align:center'>查無資料</h3>";
            return;
        }

        document.getElementById("code-box").style.display="none";
        document.querySelector(".title").style.display="none";
        document.getElementById("greeting").style.display="none";
        document.getElementById("date-display").style.display="none";

        let header=data[0].data;
        let row=data[1].data;

        function get(list){
            for(let n of list){
                let i=header.indexOf(n);
                if(i>-1) return row[i];
            }
            return "";
        }

        function money(v){
            if(!v) return "";
            let n=Number(String(v).replace(/,/g,""));
            return isNaN(n)?v:"$"+n.toLocaleString();
        }

        let html=`
        <div class="salary-card">
            <div class="salary-title">💰 薪資明細表</div>

            <div class="info">
                姓名：${get(["員工姓名"])}<br>
                月份：${get(["薪資結算月份"])}<br>
                應發：${money(get(["應發薪資"]))}
            </div>

            <div class="final-total">
                實發：${money(get(["實發金額"]))}
            </div>

            <div class="note">
                1. 每月7號發薪<br>
                2. 請洽人資
            </div>
        </div>`;

        document.getElementById("result").innerHTML=html;

        window.scrollTo({top:0,behavior:"smooth"});
    })
    .catch(err=>{
        console.error(err);
        loading.style.display="none";
        btn.disabled=false;
        alert("系統錯誤");
    });
}

</script>

</body>
</html>
