<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>薪資查詢系統</title>

<style>

body{
font-family:"微軟正黑體";
background:#f4f6f9;
margin:0;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.title{
text-align:center;
font-size:32px;
font-weight:bold;
color:#2c3e50;
}

.search-box{
text-align:center;
margin:20px 0;
}

input{
padding:12px;
font-size:18px;
width:260px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:12px 20px;
font-size:16px;
border:none;
border-radius:6px;
background:#2ecc71;
color:white;
cursor:pointer;
}

button:hover{
background:#27ae60;
}

.salary-card{
background:white;
border-radius:10px;
padding:20px;
margin-top:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.salary-title{
font-size:22px;
font-weight:bold;
text-align:center;
margin-bottom:10px;
}

.row{
display:flex;
justify-content:space-between;
margin:6px 0;
}

.section{
margin-top:15px;
font-weight:bold;
color:#34495e;
}

.total{
font-size:22px;
color:#e74c3c;
font-weight:bold;
}

@media screen and (max-width:600px){

.row{
flex-direction:column;
}

}

</style>

</head>

<body>

<div class="container">

<div class="title">員工薪資查詢</div>

<div class="search-box">

<input type="text" id="uid" placeholder="請輸入身分證字號">

<button onclick="query()">查詢</button>

<button onclick="window.print()">下載PDF</button>

</div>

<div id="result"></div>

</div>

<script>

var url="https://script.google.com/macros/s/AKfycbzWo4V3xA9ksqdLevPMpaQfX6iSuoUyGpzsAN6zYq7cP8d3QbOIyoloajNTmKL5izpc/exec";

function query(){

let uid=document.getElementById("uid").value;

fetch(url+"?uid="+uid)

.then(res=>res.json())

.then(data=>{

let container=document.getElementById("result");

container.innerHTML="";

if(data.length<=1){

container.innerHTML="<h3 style='color:red;text-align:center;'>查無資料</h3>";

return;

}

let header=data[0].data;
let row=data[1].data;

function get(name){

let index=header.indexOf(name);

return index>-1 ? row[index] : "";

}

container.innerHTML=`

<div class="salary-card">

<div class="salary-title">薪資明細表</div>

<div class="row">
<div>姓名</div>
<div>${get("員工姓名")}</div>
</div>

<div class="row">
<div>工作類型</div>
<div>${get("工作類型")}</div>
</div>

<div class="row">
<div>計薪月份</div>
<div>${get("薪資結算月份")}</div>
</div>

<div class="section">薪資加項</div>

<div class="row">
<div>本薪</div>
<div>${get("本薪")}</div>
</div>

<div class="row">
<div>加班費</div>
<div>${get("加班費")}</div>
</div>

<div class="row">
<div>全勤獎金</div>
<div>${get("全勤獎金")}</div>
</div>

<div class="row">
<div>交通津貼</div>
<div>${get("交通津貼")}</div>
</div>

<div class="row">
<div>伙食津貼</div>
<div>${get("伙食津貼")}</div>
</div>

<div class="section">薪資減項</div>

<div class="row">
<div>勞保</div>
<div>${get("勞保自負額")}</div>
</div>

<div class="row">
<div>健保</div>
<div>${get("健保自負額")}</div>
</div>

<div class="row">
<div>借支</div>
<div>${get("借支")}</div>
</div>

<div class="row total">
<div>實領薪資</div>
<div>${get("實領")}</div>
</div>

</div>

`;

});

}

</script>

</body>
</html>
