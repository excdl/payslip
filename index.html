<!DOCTYPE html> 
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>員工薪資查詢</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
body{
    font-family:"微軟正黑體";
    background:#f4f6f9;
    margin:0;
}

.container{
    max-width:520px;
    margin:auto;
    padding:20px;
}

.title{
    text-align:center;
    font-size:42px;
    font-weight:bold;
    margin-bottom:10px;
}

.greeting{
    text-align:center;
    font-size:24px;
    margin-bottom:10px;
}

.date-display{
    text-align:center;
    font-size:20px;
    margin-bottom:15px;
    color:#555;
}

/* 登入區 */
.search-box{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:15px;
    margin:30px 0;
}

input[type="password"]{
    width:100%;
    max-width:460px;
    height:65px;
    font-size:24px;
    padding:15px;
    border:2px solid #ccc;
    border-radius:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    max-width:460px;
    height:65px;
    font-size:24px;
    font-weight:bold;
    background:#2ecc71;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#27ae60;
}

button:disabled{
    background:#95a5a6;
    cursor:not-allowed;
}

/* 薪資單 */
.salary-card{
    background:white;
    border-radius:12px;
    padding:28px;
    margin-top:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

.salary-title{
    font-size:33px; /* 原30 放大10% */
    text-align:center;
    font-weight:bold;
    margin-bottom:15px;
}

.info{
    font-size:22px; /* 原20 */
    line-height:1.9;
    margin-bottom:15px;
}

.salary-table{
    width:100%;
    border-collapse:collapse;
    font-size:24px; /* 原22 */
}

.salary-table td{
    border:1px solid #ddd;
    padding:12px;
    word-break:break-word;
}

.table-head{
    background:#f2f2f2;
    font-weight:bold;
    text-align:center;
}

.subtotal{
    font-weight:bold;
    background:#fafafa;
}

.final-total{
    margin-top:20px;
    font-size:33px; /* 原30 */
    font-weight:bold;
    text-align:right;
    color:#e74c3c;
}

.note{
    margin-top:20px;
    font-size:18px; /* 原16 */
    color:#555;
}
</style>
</head>
<body>

<div class="container">
<div class="title">員工薪資查詢</div>
<div id="greeting" class="greeting"></div>
<div id="date-display" class="date-display"></div>

<div class="search-box" id="code-box" style="display:none;">
<input type="password" id="uid" placeholder="請輸入代碼">
<button id="queryBtn" onclick="querySalary()">查詢薪資</button>
</div>

<div id="result"></div>
</div>

<script>
var url="https://script.google.com/macros/s/AKfycbzCGnlurATtmipIZBZepRwWzQeRTKOV5DqEdA4IjWHHGY-MT4fuQAZqUC729tLsYVD5/exec"; 
var lineId="";
var lineName="";

function formatDate(d){
    return d.getFullYear()+"-"+(d.getMonth()+1).toString().padStart(2,'0')+"-"+d.getDate().toString().padStart(2,'0');
}

// 初始化 LIFF
liff.init({liffId: "2009495087-qHY8LDuV"})
.then(()=>{
    if(!liff.isLoggedIn()){ liff.login(); return; }
    return liff.getProfile();
})
.then(profile=>{
    lineId = profile.userId;
    lineName = profile.displayName;
    document.getElementById("greeting").innerText = lineName + " 您好:";
    document.getElementById("date-display").innerText = "查詢日期: " + formatDate(new Date());

    fetch(url+"?uid=&lineid="+encodeURIComponent(lineId))
    .then(res=>res.json())
    .then(data=>{
        if(data.length > 1){
            document.getElementById("code-box").style.display="flex";
        } else {
            document.getElementById("result").innerHTML="<h3 style='color:red;text-align:center'>尚未建立薪資資料，請聯繫人資</h3>";
        }
    })
    .catch(err=>console.error(err));
})
.catch(err=>console.error(err));

// 查詢薪資
function querySalary(){

    let uid=document.getElementById("uid").value.trim();

    if(!uid){
        alert("請輸入代碼");
        return;
    }

    let btn=document.getElementById("queryBtn");

    btn.disabled=true;
    btn.innerText="登入中...";

    fetch(url+"?uid="+encodeURIComponent(uid)+"&lineid="+encodeURIComponent(lineId))
    .then(res=>res.json())
    .then(data=>{

        btn.disabled=false;
        btn.innerText="查詢薪資";

        let container=document.getElementById("result");
        container.innerHTML="";

        if(data.length<=1){
            container.innerHTML="<h3 style='color:red;text-align:center'>查無資料</h3>";
            return;
        }

        let header=data[0].data;
        let row=data[1].data;

        function get(nameList){
            for(let name of nameList){
                let idx=header.indexOf(name);
                if(idx>-1) return row[idx];
            }
            return "";
        }

        function show(value){
            return !(value=="" || value=="0" || value=="0.00");
        }

        function formatMoney(value){
            if(value === "" || value === null || value === undefined) return "";

            let num = Number(String(value).replace(/,/g, ""));
            if (isNaN(num)) return value;

            return "$" + num.toLocaleString("zh-TW");
        }

        function moneyRow(name,value){
            if(!show(value)) return "";
            return `<tr><td>${name}</td><td>${formatMoney(value)}</td></tr>`;
        }

        function textRow(name,value){

            if(!value || value.trim()=="") return "";

            let html=value
                .split(/\r?\n/)
                .filter(x=>x.trim()!=="")
                .map(x=>`• ${x}`)
                .join("<br>");

            return `
            <tr>
                <td>${name}</td>
                <td style="text-align:left;line-height:1.8;">
                    ${html}
                </td>
            </tr>`;
        }

        let addHTML="";
        addHTML += moneyRow("加項薪資",get(["加項薪資"]));
        addHTML += textRow("加項薪資說明",get(["加項薪資說明"]));
        addHTML += moneyRow("其他加項",get(["其他加項"]));
        addHTML += textRow("其他加項說明",get(["其他加項說明"]));
        addHTML += moneyRow("新增加項",get(["新增加項"]));
        addHTML += textRow("加項說明",get(["加項說明"]));

        let minusHTML="";
        minusHTML += moneyRow("勞保費",get(["勞保費"]));
        minusHTML += moneyRow("健保費",get(["健保費"]));
        minusHTML += moneyRow("事假扣款",get(["事假扣款"]));
        minusHTML += moneyRow("病假扣款",get(["病假扣款"]));
        minusHTML += moneyRow("其他減項",get(["其他減項"]));
        addHTML += textRow("其他減項說明",get(["其他減項說明"]));
        minusHTML += moneyRow("新增減項",get(["新增減項"]));
        addHTML += textRow("減項說明",get(["減項說明"]));

        container.innerHTML=`
        <div id="salary-card" class="salary-card">
            <div class="salary-title">薪資明細表</div>

            <div class="info">
                姓名：${get(["員工姓名"])}<br>
                計薪月份：${get(["薪資結算月份"])}<br>
                應發薪資：${formatMoney(get(["應發薪資"]))}
            </div>

            <table class="salary-table">
                <tr class="table-head">
                    <td>項目(+)</td>
                    <td>金額</td>
                </tr>
                ${addHTML}
                <tr class="subtotal">
                    <td>加項總額</td>
                    <td>${formatMoney(get(["加項總額"]))}</td>
                </tr>
            </table>

            <table class="salary-table" style="margin-top:10px;">
                <tr class="table-head">
                    <td>項目(-)</td>
                    <td>金額</td>
                </tr>
                ${minusHTML}
                <tr class="subtotal">
                    <td>減項總額</td>
                    <td>${formatMoney(get(["減項總額"]))}</td>
                </tr>
            </table>

            <div class="final-total">
                實發金額：${formatMoney(get(["實發金額"]))}
            </div>

            <div class="note">
                備註事項<br>
                1. 每月7號為薪資發放日<br>
                2. 薪資如有問題請聯繫人資
            </div>
        </div>`;
    })
    .catch(err=>{

        console.error(err);

        btn.disabled=false;
        btn.innerText="查詢薪資";

        alert("系統連線失敗，請稍後再試");
    });
}
</script>

</body>
</html>
