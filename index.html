<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>員工薪資查詢 - 雙層認證</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
body{font-family:"微軟正黑體";background:#f4f6f9;margin:0;}
.container{max-width:520px;margin:auto;padding:20px;}
.title{text-align:center;font-size:38px;font-weight:bold;margin-bottom:10px;}
.greeting{text-align:center;font-size:22px;margin-bottom:10px;}
.search-box{display:flex;justify-content:center;align-items:center;gap:10px;margin:20px 0;}
input, button{padding:14px;font-size:18px;border-radius:6px;height:50px;box-sizing:border-box;}
input[type="password"]{width:70%;border:1px solid #ccc;}
button{background:#2ecc71;color:white;border:none;cursor:pointer;white-space:nowrap;flex:1;}
button:hover{background:#27ae60;}
.salary-card{background:white;border-radius:12px;padding:25px;margin-top:20px;box-shadow:0 4px 10px rgba(0,0,0,0.15);}
.salary-title{font-size:30px;text-align:center;font-weight:bold;margin-bottom:15px;}
.info{font-size:20px;line-height:1.8;margin-bottom:15px;}
.salary-table{width:100%;border-collapse:collapse;font-size:22px;}
.salary-table td{border:1px solid #ddd;padding:10px;}
.table-head{background:#f2f2f2;font-weight:bold;text-align:center;}
.subtotal{font-weight:bold;background:#fafafa;}
.final-total{margin-top:20px;font-size:30px;font-weight:bold;text-align:right;color:#e74c3c;}
.note{margin-top:20px;font-size:16px;color:#555;}
.date-display{text-align:center;font-size:18px;margin-bottom:15px;color:#555;}
@media print {body * {visibility:hidden;} #salary-card, #salary-card * {visibility:visible;} #salary-card {position:absolute; left:0; top:0;width:100%;margin:0;padding:25px;}}
</style>
</head>
<body>

<div class="container">
<div class="title">員工薪資查詢</div>
<div id="greeting" class="greeting"></div>
<div id="date-display" class="date-display"></div>

<!-- 代碼輸入 -->
<div class="search-box" id="code-box" style="display:none;">
<input type="password" id="uid" placeholder="請輸入代碼">
<button onclick="querySalary()">查詢薪資</button>
<button onclick="window.print()">下載PDF</button>
</div>

<div id="result"></div>
</div>

<script>
var url="https://script.google.com/macros/s/AKfycbxlS02lVCxc4QZ71x64xTgKBkZ6QG7ZJXnvXKpX-bz4Y5GBqt_gurfzcLbKbzOkEKnr/exec"; // 替換成你的 GAS 網址
var lineId="";
var lineName="";

// 日期格式
function formatDate(d){
    return d.getFullYear()+"-"+(d.getMonth()+1).toString().padStart(2,'0')+"-"+d.getDate().toString().padStart(2,'0');
}

// 初始化 LIFF
liff.init({liffId: "2009495087-qHY8LDuV"})
.then(()=>{
    if(!liff.isLoggedIn()){ liff.login(); return; }
    return liff.getProfile();
})
.then(profile=>{
    lineId = profile.userId;
    lineName = profile.displayName;
    document.getElementById("greeting").innerText = lineName + " 您好:";
    document.getElementById("date-display").innerText = "查詢日期: " + formatDate(new Date());

    // LINE ID 驗證成功 → 顯示代碼輸入框
    document.getElementById("code-box").style.display="flex";
})
.catch(err=>console.error(err));

// 查詢薪資
function querySalary(){
    let uid=document.getElementById("uid").value.trim();
    if(!uid){alert("請輸入代碼"); return;}
    fetch(url+"?uid="+encodeURIComponent(uid)+"&lineid="+encodeURIComponent(lineId))
    .then(res=>res.json())
    .then(data=>{
        let container=document.getElementById("result");
        container.innerHTML="";
        if(data.length<=1){container.innerHTML="<h3 style='color:red;text-align:center'>查無資料</h3>"; return;}
        let header=data[0].data;
        let row=data[1].data;

        function get(nameList){for(let name of nameList){let idx=header.indexOf(name);if(idx>-1) return row[idx];} return "";}
        function show(value){return !(value=="" || value=="0" || value=="0.00");}
        function formatNum(value){if(value=="" || value=="0") return ""; return Number(value).toLocaleString();}
        function rowHTML(name,value){if(!show(value)) return ""; return `<tr><td>${name}</td><td>${formatNum(value)}</td></tr>`;}

        let addHTML="";
        addHTML+=rowHTML("本薪",get(["本薪","當月薪資"]));
        addHTML+=rowHTML("加班費",get(["加班費"]));
        addHTML+=rowHTML("全勤獎金",get(["全勤獎金"]));
        addHTML+=rowHTML("交通津貼",get(["交通津貼"]));
        addHTML+=rowHTML("伙食津貼",get(["伙食津貼"]));
        addHTML+=rowHTML("其他加項",get(["其他加項"]));

        let minusHTML="";
        minusHTML+=rowHTML("勞保自負額",get(["勞保自負額"]));
        minusHTML+=rowHTML("健保自負額",get(["健保自負額"]));
        minusHTML+=rowHTML("事假扣款",get(["事假扣款"]));
        minusHTML+=rowHTML("病假扣款",get(["病假扣款"]));
        minusHTML+=rowHTML("遲到/早退扣款",get(["遲到/早退扣款"]));
        minusHTML+=rowHTML("曠職扣款",get(["曠職扣款"]));
        minusHTML+=rowHTML("借支",get(["借支"]));
        minusHTML+=rowHTML("未打卡扣款",get(["未打卡扣款"]));

        container.innerHTML=`
        <div id="salary-card" class="salary-card">
          <div class="salary-title">薪資明細表</div>
          <div class="info">
            姓名：${get(["員工姓名"])}<br>
            工作類型：${get(["工作類型"])}<br>
            計薪月份：${get(["薪資結算月份"])}<br>
            結算日：${get(["結算日"])}
          </div>
          <table class="salary-table">
            <tr class="table-head"><td>薪資加項</td><td>金額</td></tr>
            ${addHTML}
            <tr class="subtotal"><td>加項總計 (+)</td><td>${formatNum(get(["加項合計(A)"]))}</td></tr>
          </table>
          <table class="salary-table" style="margin-top:10px;">
            <tr class="table-head"><td>薪資減項</td><td>金額</td></tr>
            ${minusHTML}
            <tr class="subtotal"><td>減項總計 (-)</td><td>${formatNum(get(["減項合計(B)"]))}</td></tr>
          </table>
          <div class="final-total">實領薪資：${formatNum(get(["實領"]))}</div>
          <div class="note">
            備註事項<br>
            1. 每月10號為薪資發放日<br>
            2. 薪資如有問題請聯繫人資
          </div>
        </div>`;
    });
}
</script>

</body>
</html>
